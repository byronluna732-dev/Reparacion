<style>
body {
    margin: 0;
    font-family: sans-serif;
    background-image: url(fondo2.jpg);
    background-size: cover;
    background-position: left;
    background-repeat: no-repeat;
    display: flex;
    flex-direction: column;
    align-items: left;
    min-height: 100vh;
    text-align: center;
    color: white;
}

nav {
    background-color:rgb(15, 2, 2); 
    padding: 15px;       
    border-radius: 10px;
    margin-top: 10px;
}

.menu-toggle {
    display: none;
    font-size: 28px;
    background: none;
    border: none;
    color: red;
    cursor: pointer;
}

.nav-links {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.nav-links a {
    color: blue;        
    text-decoration: none;   
    margin: 0 10px;         
    font-weight: bold;
}

.nav-links a:hover {
    background-color: red;
    color: white;
    padding: 5px;
    border-radius: 5px;
}

@media (max-width: 768px) {
    .menu-toggle {
        display: block;
        margin: auto;
    }

    .nav-links {
        display: none;
        flex-direction: column;
    }

    .nav-links.active {
        display: flex;
    }
}

img {
    margin-top: 20px;
    border-radius: 10px;
    border: 3px solid rgb(231, 226, 226);
}

.contenido {
    background: transparent ;
    padding: 15px;
    border-radius: 10px;
    margin-top: 5px;
}
